<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="./assets/entry.css" />
    <title>TrustClean Lanka</title>
  </head>
  <body>
    <script>
      // Netlify static hosting does not inject TanStack Start SSR payload.
      // Seed a minimal payload so the client can boot without SSR hydration data.
      window.$_TSR = window.$_TSR || {
        initialized: false,
        buffer: [],
        router: {
          matches: [],
          manifest: {},
          dehydratedData: null,
          lastMatchId: null,
        },
      };
    </script>
    <!-- TanStack Start browser bootstrap hydrates into `document` -->
    <script type="module" src="./assets/entry.js"></script>
  </body>
</html>
